server {
  listen 80;

  # API calls → backend container
  location /api/ {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Uploaded resume files → backend container
  location /uploads/ {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
  }

  # Vue SPA: fall back to index.html so client-side routes work on refresh
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
